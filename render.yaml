services:
  - type: web
    name: sf-slg
    env: node
    plan: starter
    buildCommand: npm ci
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: "*"
      - key: DB_PATH
        value: /var/data/game.db
    disk:
      name: sf-slg-data
      mountPath: /var/data
      sizeGB: 1
